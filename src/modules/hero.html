<section
  class="hydro-hero"
  th:with="
    heroCover = ${#strings.isEmpty(theme.config.home?.hero_cover) ? #theme.assets('/images/hero-featured.jpg') : theme.config.home.hero_cover},
    heroFeaturedSizeText = ${theme.config.home?.hero_featured_size == null ? '' : #strings.trim('' + theme.config.home.hero_featured_size)},
    heroFeaturedSizeRaw = ${heroFeaturedSizeText.matches('^[0-9]{1,3}$') ? T(java.lang.Integer).parseInt(heroFeaturedSizeText) : 4},
    heroFeaturedSize = ${heroFeaturedSizeRaw < 1 ? 4 : heroFeaturedSizeRaw},
    heroFeaturedPosts = ${theme.config.home?.hero_featured_posts},
    hasHeroFeaturedPosts = ${heroFeaturedPosts != null and not #lists.isEmpty(heroFeaturedPosts)}
  "
  data-hydro-hero
>
  <div class="hydro-hero__image">
    <div class="hydro-hero__image-inner" data-hydro-hero-image>
      <div class="hydro-hero__image-motion" data-hydro-hero-motion>
        <img th:src="${heroCover}" th:alt="${theme.config.home?.hero_label ?: 'Hydro-Minim'}" />
        <div class="hydro-hero__fade" aria-hidden="true"></div>
      </div>
    </div>
    <div class="hydro-hero__label" th:text="${theme.config.home?.hero_label ?: '氢视窗'}">氢视窗</div>
  </div>

  <div class="hydro-hero__content">
    <div class="hydro-container">
      <div class="hydro-hero__grid">
        <div>
          <h1 class="hydro-hero__title" data-split-title th:text="${theme.config.home?.hero_title ?: '探索'}">探索</h1>
          <p th:text="${theme.config.home?.hero_description}">
            精选的想法、故事和创意，全部汇集于此。如氢气般轻快、简洁、流畅的体验。
          </p>
          <div class="hydro-scroll-hint">
            <span aria-hidden="true"></span>
            <strong th:text="${theme.config.home?.hero_scroll_hint ?: '向下滚动'}">向下滚动</strong>
          </div>
        </div>

        <div>
          <ul class="hydro-hero-list">
            <th:block th:if="${hasHeroFeaturedPosts}" th:each="postName,stat : ${heroFeaturedPosts}">
              <th:block
                th:if="${stat.index < heroFeaturedSize and not #strings.isEmpty(postName)}"
                th:with="post=${postFinder.getByName(postName)}"
              >
                <li class="hydro-list-item" th:if="${post != null}">
                  <a th:href="@{${post.status.permalink}}">
                    <span th:text="${#numbers.formatInteger(stat.index + 1, 2)}">01</span>
                    <strong th:text="${post.spec.title}">数字设计的未来</strong>
                    <time th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2024.01.15</time>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M5 12h14M13 5l7 7-7 7"></path>
                    </svg>
                  </a>
                </li>
              </th:block>
            </th:block>
            <li
              class="hydro-list-item"
              th:unless="${hasHeroFeaturedPosts}"
              th:each="post,stat : ${posts.items}"
              th:if="${stat.index < heroFeaturedSize}"
            >
              <a th:href="@{${post.status.permalink}}">
                <span th:text="${#numbers.formatInteger(stat.index + 1, 2)}">01</span>
                <strong th:text="${post.spec.title}">数字设计的未来</strong>
                <time th:text="${#dates.format(post.spec.publishTime, 'yyyy.MM.dd')}">2024.01.15</time>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14M13 5l7 7-7 7"></path>
                </svg>
              </a>
            </li>
          </ul>
          <div
            th:if="${not hasHeroFeaturedPosts and posts.total == 0}"
            class="hydro-empty"
            th:text="${theme.config.home?.hero_empty_text ?: '还没有发布文章。'}"
          >
            还没有发布文章。
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="hydro-hero__glow" aria-hidden="true"></div>
</section>
