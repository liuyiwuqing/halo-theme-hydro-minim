<include src="layout.html">
  <template name="head">
    <title th:text="|${theme.config.taxonomy?.tag_title ?: '标签'} - ${site.title}|">标签</title>
  </template>

  <section class="hydro-tags-page">
    <div class="hydro-container">
      <header class="hydro-tags-hero">
        <div class="hydro-tags-hero__copy">
          <p th:text="${theme.config.taxonomy?.tag_eyebrow ?: 'Hydro-Minim / Tags'}">Hydro-Minim / Tags</p>
          <h1 th:text="${theme.config.taxonomy?.tag_title ?: '标签'}">标签</h1>
          <span
            th:text="${theme.config.taxonomy?.tag_description ?: '把散落的文章压缩成一组轻量关键词，从一个符号进入另一条阅读路径。'}"
          >
            把散落的文章压缩成一组轻量关键词，从一个符号进入另一条阅读路径。
          </span>
        </div>
        <dl
          class="hydro-tags-hero__meta"
          th:if="${(theme.config.taxonomy == null or theme.config.taxonomy.tag_show_meta != false) and not #lists.isEmpty(tags)}"
        >
          <div>
            <dt th:text="${theme.config.taxonomy?.tag_keywords_metric_label ?: 'Keywords'}">Keywords</dt>
            <dd th:text="${#lists.size(tags)}">0</dd>
          </div>
          <div>
            <dt th:text="${theme.config.taxonomy?.tag_shape_metric_label ?: 'Shape'}">Shape</dt>
            <dd th:text="${theme.config.taxonomy?.tag_shape_value ?: 'Cloud'}">Cloud</dd>
          </div>
        </dl>
      </header>

      <div class="hydro-tags-cloud-board" th:if="${not #lists.isEmpty(tags)}">
        <div class="hydro-tags-cloud" aria-label="标签云">
          <a
            th:each="tag,stat : ${tags}"
            th:href="@{${tag.status.permalink}}"
            th:style="|--tag-order: ${stat.index}; --tag-weight: ${tag.postCount ?: 0}; --tag-lane: ${stat.index % 9}; --tag-drift: ${stat.index % 7};|"
            class="hydro-tag-chip"
          >
            <span class="hydro-tag-chip__hash">#</span>
            <span class="hydro-tag-chip__name" th:text="${tag.spec.displayName}">Tag</span>
            <sup th:text="${tag.postCount ?: 0}">0</sup>
          </a>
        </div>
      </div>
      <div
        th:if="${#lists.isEmpty(tags)}"
        class="hydro-empty"
        th:text="${theme.config.taxonomy?.tag_empty_text ?: '还没有创建标签。'}"
      >
        还没有创建标签。
      </div>
    </div>
  </section>
</include>
