<include src="layout.html">
  <template name="head">
    <title th:text="|退出登录 - ${site.title}|">退出登录</title>
    <!-- 引入系统必须的认证逻辑脚本和默认样式 -->
    <th:block th:replace="~{gateway_fragments/common::basicStaticResources}" />
    <!-- 针对 Halo 默认的表单结构进行“氢风格”样式覆盖 -->
    <style>
      .halo-form-wrapper {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        width: 100%;
      }
      .halo-form .user-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
        padding: 1.5rem;
        border-radius: 1.5rem;
        background-color: rgb(var(--hydro-ink-rgb) / 4%);
        border: 1px solid rgb(var(--hydro-ink-rgb) / 8%);
      }
      .halo-form .user-avatar {
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--hydro-bg);
        box-shadow: 0 4px 12px rgb(var(--hydro-ink-rgb) / 10%);
      }
      .halo-form .user-details {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
      }
      .halo-form .user-details span:first-child {
        font-size: 0.8125rem;
        color: var(--hydro-muted);
        letter-spacing: 0.04em;
      }
      .halo-form .user-name {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--hydro-text);
      }
      .halo-form .form-item {
        margin-bottom: 0.9rem;
        text-align: center;
      }
      .halo-form button[type="submit"] {
        width: 100%;
        height: 3.25rem;
        border-radius: 9999px !important;
        border: 1px solid var(--hydro-text) !important;
        background: var(--hydro-text) !important;
        color: var(--hydro-bg) !important;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        cursor: pointer;
        will-change: transform, box-shadow;
      }
      .halo-form button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 26px rgb(var(--hydro-ink-rgb) / 16%) !important;
      }
      .halo-form button[type="submit"]:active {
        transform: translateY(0);
      }
      .halo-form .cancel-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 3.25rem;
        padding: 0 1.5rem;
        color: var(--hydro-text) !important;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 9999px;
        background: rgb(var(--hydro-ink-rgb) / 4%);
        border: 1px solid rgb(var(--hydro-ink-rgb) / 10%);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        margin-top: 0.65rem;
      }
      .halo-form .cancel-link:hover {
        background: rgb(var(--hydro-ink-rgb) / 7%);
        border-color: rgb(var(--hydro-ink-rgb) / 18%);
        transform: translateY(-2px);
      }
      .halo-form .cancel-link:active {
        transform: translateY(0);
      }
      .halo-form button[type="submit"]:focus-visible,
      .halo-form .cancel-link:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgb(var(--hydro-ink-rgb) / 10%) !important;
      }
    </style>
  </template>

  <main class="hydro-login-page flex min-h-[60vh] items-center justify-center px-6 pb-20 pt-20">
    <div class="w-full max-w-sm">
      <div class="mb-8 text-center">
        <h1 class="mb-2 text-4xl font-bold text-[var(--hydro-text)]" th:text="${site.title}">氢</h1>
        <p class="text-[var(--hydro-muted)]">退出当前账号</p>
      </div>

      <div class="halo-form-wrapper">
        <!-- 引入 Halo 的内置退出登录表单片段 -->
        <th:block th:replace="~{gateway_fragments/logout::form}" />
      </div>
    </div>
  </main>
</include>
